version: 1
id: openai-responses
provider: openai
family: responses
coverage: bootstrap
metadata: metadata.yaml
service_classes:
  economy:
    requested_tier: flex
    actual_tier: flex
  standard:
    requested_tier: default
    actual_tier: default
  priority:
    requested_tier: priority
    actual_tier: priority
  priority_downgrade:
    requested_tier: priority
    actual_tier: default
  unknown_tier:
    actual_tier: scale
cases:
  - id: captured-wire-request
    artifacts:
      wire: request.wire.json
  - id: response
    artifacts:
      wire: response.completed.json
      semantic: response.semantic.json
