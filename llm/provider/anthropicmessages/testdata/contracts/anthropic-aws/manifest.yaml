version: 1
id: anthropic-aws
provider: anthropic
family: messages
coverage: bootstrap
metadata: metadata.yaml
service_classes:
  economy:
    supported: false
  standard:
    requested_tier: standard_only
    actual_tier: standard
  priority:
    requested_tier: auto
    actual_tier: priority
cases:
  - id: captured-wire-request
    artifacts:
      wire: request.wire.json
  - id: classified-error
    artifacts:
      wire: error.authentication.json
