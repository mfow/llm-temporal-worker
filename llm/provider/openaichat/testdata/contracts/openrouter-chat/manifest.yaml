version: 1
id: openrouter-chat
provider: openrouter
family: chat
coverage: enforced
metadata: metadata.yaml
service_classes:
  economy:
    supported: false
  standard:
    requested_tier: standard
    actual_tier: default
  priority:
    supported: false
  provider_fallback_disabled:
    allow_fallbacks: false
    require_parameters: true
cases:
  - id: semantic-request
    artifacts:
      semantic: request.semantic.json
  - id: captured-wire-request
    artifacts:
      wire: request.wire.json
  - id: response
    artifacts:
      wire: response.completed.json
      semantic: response.semantic.json
  - id: usage-cost
    artifacts:
      wire: usage-cost.response.json
      semantic: usage-cost.semantic.json
  - id: classified-error
    artifacts:
      wire: classified-error.wire.json
  - id: security-redaction
    artifacts:
      wire: security-redaction.wire.json
  - id: strict-loss
    artifacts:
      semantic: strict-loss.semantic.json
      wire: strict-loss.wire.json
  - id: best-effort-diagnostic
    artifacts:
      semantic: best-effort-diagnostic.semantic.json
  - id: class-facts
    artifacts:
      semantic: class-facts.semantic.json
      wire: class-facts.wire.json
  - id: continuation-compatibility
    artifacts:
      semantic: continuation-compatibility.semantic.json
      wire: continuation-compatibility.wire.json
  - id: full-stream
    artifacts:
      events: stream.decoder.events
  - id: fragmented-stream
    artifacts:
      events: stream.decoder.events
