version: llm-temporal-worker/v1
environment: production

server:
  health_address: 0.0.0.0:8080
  metrics_address: 0.0.0.0:9090
  shutdown_timeout: 90s
  finalization_timeout: 15s
  readiness_probe_interval: 5s
  readiness_probe_timeout: 2s
  inline_payload_bytes: 524288

temporal:
  target: temporal.example.internal:7233
  namespace: production
  task_queue: llm-inference
  identity_prefix: llmtw
  tls:
    enabled: true
    server_name: temporal.example.internal
    ca_file: /var/run/secrets/llmtw/temporal-ca.pem
  worker:
    max_concurrent_activities: 64
    max_concurrent_activity_task_polls: 8
    graceful_stop_timeout: 45s

state:
  kind: redis
  operation_terminal_retention: 45d
  ambiguous_retention: 90d
  continuation_retention: 30d
  reservation_lease: 2m
  redis:
    addresses: [redis.example.internal:6379]
    username:
      kind: file
      path: /var/run/secrets/llmtw/redis-username
    password:
      kind: file
      path: /var/run/secrets/llmtw/redis-password
    tls:
      enabled: true
      server_name: redis.example.internal
      ca_file: /var/run/secrets/llmtw/redis-ca.pem
    admission_hash_tag: admission
    admission_mode: function
    function_library: llmtw_admission_v1
    admission_version: admission_v1
    admission_digest: c09e24d73750bebee4aad8cd9b1f05abaa22001528cef0ff6842f2241bb8c20b
    max_connections: 96
    dial_timeout: 2s
    operation_timeout: 3s
    required_persistence: aof_and_rdb

blob_store:
  kind: s3
  inline_bytes: 262144
  s3:
    bucket: replace-with-production-bucket
    region: ap-southeast-2
    prefix: v1
    auth:
      kind: aws_default_chain

limits:
  request_bytes: 1048576
  items: 512
  parts_per_item: 64
  tools: 128
  schema_bytes: 262144
  json_depth: 64
  continuation_depth: 256
  route_attempts: 6
  provider_timeout: 120s
  max_output_tokens: 32768
  max_budget_buckets_per_window: 2048
  token_estimate_safety_ratio: "1.35"

endpoints:
  openai-production:
    family: openai_responses
    base_url: https://api.openai.com/v1
    auth:
      kind: bearer_env
      name: OPENAI_API_KEY
    account_region: global
    timeout: 115s
    service_classes:
      economy:
        provider_value: flex
      standard:
        provider_value: default
      priority:
        provider_value: priority
    capability_profile: production-openai-responses
    price_catalog: production-v1
    provider_storage:
      permitted: false

models:
  default:
    allowed_tenants: [replace-with-tenant]
    data_regions: [global]
    routes:
      - id: openai-primary
        endpoint: openai-production
        model: replace-with-model
        classes: [economy, standard, priority]

capabilities:
  catalogs:
    - file: /etc/llmtw/capabilities.yaml
      sha256: 0fa6515fcda1c5f1c01356bea6a961e16689b05d8f907f21961f000d3860f044
  unknown_in_strict_mode: reject

pricing:
  catalogs:
    - file: /etc/llmtw/prices.yaml
      sha256: 69975c13bfcf61a58d4fd2a20090c581ba48a6d51db137e31460fb17210150d4
  require_price_when_budgeted: true
  currency: USD

budgets:
  require_match: true
  policies:
    - id: production-default
      match:
        tenant: replace-with-tenant
        environment: production
      windows:
        - duration: 1h
          bucket: 1m
          limit_micro_usd: 25000000
        - duration: 24h
          bucket: 5m
          limit_micro_usd: 250000000

continuation:
  handle_keys:
    - id: production-2026-07
      primary: true
      secret:
        kind: file
        path: /var/run/secrets/llmtw/continuation-hmac
  retain_canonical_transcript: true
  allow_provider_hosted_state: false

telemetry:
  logs:
    format: json
    level: info
  metrics:
    enabled: true
  tracing:
    enabled: false
    otlp_endpoint: ""
    sample_ratio: "0"
  content_logging: disabled
