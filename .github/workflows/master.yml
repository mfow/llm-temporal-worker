name: Master

on:
  push:
    branches:
      - master
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * *"
      timezone: Australia/Sydney

permissions:
  contents: read

concurrency:
  group: master-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fuzz-shard:
    name: Fuzz shard ${{ matrix.shard }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2]

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: 1.26.x
          cache: true

      - name: Run bounded semantic fuzz shard
        run: FUZZ_TIME=45s bash scripts/run-fuzz.sh shard "${{ matrix.shard }}"

  verify:
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Validate documentation
        shell: bash
        run: |
          set -euo pipefail
          test -f docs/index.md
          test -f docs/superpowers/plans/2026-07-13-master-sequence.md
          if grep -R -n -E '(TBD|TODO|FIXME|PLACEHOLDER)' docs README.md; then
            echo "Planning placeholders are not allowed."
            exit 1
          fi
          python3 - <<'PY'
          import pathlib
          import re
          import sys

          root = pathlib.Path.cwd().resolve()
          missing = []
          pattern = re.compile(r"(?<!!)\[[^\]]+\]\(([^)]+)\)")
          files = [root / "README.md", *sorted((root / "docs").rglob("*.md"))]
          for source in files:
              text = source.read_text(encoding="utf-8")
              for raw in pattern.findall(text):
                  target = raw.strip().split(maxsplit=1)[0].strip("<>")
                  if (
                      not target
                      or target.startswith(("#", "https://", "http://", "mailto:"))
                  ):
                      continue
                  path_text = target.split("#", 1)[0]
                  destination = (source.parent / path_text).resolve()
                  if root not in (destination, *destination.parents):
                      missing.append(f"{source.relative_to(root)}: escapes repository: {raw}")
                  elif not destination.exists():
                      missing.append(f"{source.relative_to(root)}: missing: {raw}")
          if missing:
              print("\n".join(missing), file=sys.stderr)
              raise SystemExit(1)
          PY
          test "$(grep -o -F 'economy | standard | priority' docs/decisions/0002-service-classes.md | wc -l | tr -d ' ')" -eq 1

      - name: Detect Go implementation
        id: go
        shell: bash
        run: |
          if [[ -f go.mod ]]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Go
        if: steps.go.outputs.present == 'true'
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: 1.26.x
          cache: true

      - name: Verify workflow policy
        if: steps.go.outputs.present == 'true'
        run: make workflow-verify

      - name: Check Go formatting
        if: steps.go.outputs.present == 'true'
        shell: bash
        run: bash scripts/check-go-format.sh

      - name: Verify schemas and documentation
        if: steps.go.outputs.present == 'true'
        run: |
          make schema-verify
          make docs-verify

      - name: Vet
        if: steps.go.outputs.present == 'true'
        run: go vet ./...

      - name: Test with race detector
        if: steps.go.outputs.present == 'true'
        run: go test -race ./...

      - name: Compile guarded live-provider harness
        if: steps.go.outputs.present == 'true'
        run: go test -tags=live ./integration/live -run '^$'

      - name: Verify source safety and supply chain
        id: security_verify
        if: steps.go.outputs.present == 'true'
        run: |
          mkdir -p security-artifacts
          SECURITY_REPORT=security-artifacts/security-verify.json make security-verify

      - name: Upload redacted security verification report
        if: failure() && steps.security_verify.outcome == 'failure'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: security-verify-report
          path: security-artifacts/security-verify.json
          if-no-files-found: error
          retention-days: 14

      - name: Run live Redis conformance
        if: steps.go.outputs.present == 'true'
        run: make readiness-integration

      - name: Build worker
        if: steps.go.outputs.present == 'true'
        run: go build ./...

      - name: Detect container
        id: container
        shell: bash
        run: |
          if [[ -f Dockerfile ]]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify hardened container
        if: steps.container.outputs.present == 'true'
        run: make image-verify

      - name: Scheduled test repetition
        if: github.event_name == 'schedule' && steps.go.outputs.present == 'true'
        run: go test -race -count=5 ./...
