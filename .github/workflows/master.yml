name: Master

on:
  push:
    branches:
      - master
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * *"
      timezone: Australia/Sydney

permissions:
  contents: read

concurrency:
  group: master-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  container:
    name: Container image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up latest stable Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: stable
          cache: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
        with:
          version: v0.16.2
          driver-opts: image=moby/buildkit:v0.16.0@sha256:bc1fe18224dbcb92599139db0c745696c48ba9fd4ac24038d1fa81fdd7dcac27

      - name: Resolve image build metadata
        id: metadata
        shell: bash
        run: |
          set -euo pipefail
          {
            printf 'version=master-%s\n' "$GITHUB_RUN_NUMBER"
            printf 'revision=%s\n' "$GITHUB_SHA"
            printf 'build_time=%s\n' "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            printf 'source=https://github.com/%s\n' "$GITHUB_REPOSITORY"
            printf 'go_version=%s\n' "$(go env GOVERSION)"
          } >> "$GITHUB_OUTPUT"

      - name: Build container image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ./golang
          file: ./golang/Dockerfile
          push: false
          tags: llm-temporal-worker:master-${{ github.run_number }}
          cache-from: type=gha,scope=llmtw-master
          cache-to: type=gha,mode=max,scope=llmtw-master,ignore-error=true
          build-args: |
            VERSION=${{ steps.metadata.outputs.version }}
            REVISION=${{ steps.metadata.outputs.revision }}
            BUILD_TIME=${{ steps.metadata.outputs.build_time }}
            SOURCE=${{ steps.metadata.outputs.source }}
            GO_VERSION=${{ steps.metadata.outputs.go_version }}

  ocaml:
    name: OCaml package
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install Protocol Buffers compiler
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install --yes protobuf-compiler

      - name: Verify OCaml Temporal dependency pin parity
        run: bash scripts/check-ocaml-temporal-pin.sh

      - name: Set up OCaml
        uses: ocaml/setup-ocaml@15d660006c1d3110d77c34b7faa3bddefe8b82f0 # v3
        with:
          ocaml-compiler: 5.2.0
          disable-cache: true

      - name: Install pinned nested package dependencies
        working-directory: ocaml/llm_temporal_worker
        run: |
          set -euo pipefail
          opam pin add --yes --kind=git temporal-sdk \
            'git+https://github.com/mfow/ocaml-temporal.git#d531e2266115358e31b260d9e4d2ff359ec05bf3'
          opam install --yes . --deps-only

      - name: Build and test nested package
        working-directory: ocaml/llm_temporal_worker
        run: |
          set -euo pipefail
          opam exec -- dune build
          opam exec -- dune runtest

      - name: Prove remote Git subpath installation
        env:
          PACKAGE_REF: ${{ github.sha }}
        run: |
          set -euo pipefail
          opam pin add --yes --kind=git llm-temporal-ocaml \
            "git+https://github.com/${GITHUB_REPOSITORY}.git#${PACKAGE_REF}" \
            --subpath=ocaml/llm_temporal_worker
          opam install --yes --with-test llm-temporal-ocaml

      - name: Build downstream Dune consumer
        run: opam exec -- dune build --root ocaml/consumer_smoke

      - name: Compile downstream workflow sample
        run: opam exec -- dune build --root ocaml/consumer_workflow_smoke

  fuzz-shard:
    name: Fuzz shard ${{ matrix.shard }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2]

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: stable
          cache: true
          cache-dependency-path: golang/go.sum

      - name: Run bounded semantic fuzz shard
        working-directory: golang
        run: FUZZ_TIME=250000x bash scripts/run-fuzz.sh shard "${{ matrix.shard }}"

  verify:
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 45
    services:
      postgres:
        image: postgres:17.5-alpine@sha256:6567bca8d7bc8c82c5922425a0baee57be8402df92bae5eacad5f01ae9544daa
        env:
          POSTGRES_USER: llmtw
          POSTGRES_PASSWORD: llmtw
          POSTGRES_DB: llm_worker
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U llmtw -d llm_worker"
          --health-interval 5s --health-timeout 3s --health-retries 24

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Validate documentation
        shell: bash
        run: |
          set -euo pipefail
          test -f docs/index.md
          test -f docs/superpowers/plans/2026-07-13-master-sequence.md
          if grep -R -n -E '(TBD|TODO|FIXME|PLACEHOLDER)' docs README.md; then
            echo "Planning placeholders are not allowed."
            exit 1
          fi
          python3 - <<'PY'
          import pathlib
          import re
          import sys

          root = pathlib.Path.cwd().resolve()
          missing = []
          pattern = re.compile(r"(?<!!)\[[^\]]+\]\(([^)]+)\)")
          files = [root / "README.md", *sorted((root / "docs").rglob("*.md"))]
          for source in files:
              text = source.read_text(encoding="utf-8")
              for raw in pattern.findall(text):
                  target = raw.strip().split(maxsplit=1)[0].strip("<>")
                  if (
                      not target
                      or target.startswith(("#", "https://", "http://", "mailto:"))
                  ):
                      continue
                  path_text = target.split("#", 1)[0]
                  destination = (source.parent / path_text).resolve()
                  if root not in (destination, *destination.parents):
                      missing.append(f"{source.relative_to(root)}: escapes repository: {raw}")
                  elif not destination.exists():
                      missing.append(f"{source.relative_to(root)}: missing: {raw}")
          if missing:
              print("\n".join(missing), file=sys.stderr)
              raise SystemExit(1)
          PY
          test "$(grep -o -F 'economy | standard | priority' docs/decisions/0002-service-classes.md | wc -l | tr -d ' ')" -eq 1

      - name: Detect Go implementation
        id: go
        shell: bash
        run: |
          if [[ -f golang/go.mod ]]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Go
        if: steps.go.outputs.present == 'true'
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: stable
          cache: true
          cache-dependency-path: golang/go.sum

      - name: Verify workflow policy
        if: steps.go.outputs.present == 'true'
        working-directory: golang
        run: make workflow-verify

      - name: Check Go formatting
        if: steps.go.outputs.present == 'true'
        working-directory: golang
        shell: bash
        run: bash scripts/check-go-format.sh

      - name: Verify schemas and documentation
        if: steps.go.outputs.present == 'true'
        working-directory: golang
        run: |
          make schema-verify
          make docs-verify

      - name: Verify PostgreSQL schema and namespace
        if: steps.go.outputs.present == 'true'
        working-directory: golang
        env:
          LLMTW_POSTGRES_ADDR: 127.0.0.1:5432
          LLMTW_POSTGRES_DATABASE: llm_worker
          LLMTW_POSTGRES_SCHEMA: llm_worker
        run: make postgres-integration

      - name: Vet
        if: steps.go.outputs.present == 'true'
        working-directory: golang
        run: go vet ./...

      - name: Test with race detector
        if: steps.go.outputs.present == 'true'
        working-directory: golang
        run: go test -race ./...

      - name: Compile guarded live-provider harness
        if: steps.go.outputs.present == 'true'
        working-directory: golang
        run: go test -tags=live ./integration/live -run '^$'

      - name: Compile guarded Redis benchmark
        if: steps.go.outputs.present == 'true'
        working-directory: golang
        run: make redis-benchmark-compile

      - name: Verify source safety and supply chain
        id: security_verify
        if: steps.go.outputs.present == 'true'
        working-directory: golang
        run: |
          mkdir -p security-artifacts
          SECURITY_REPORT=security-artifacts/security-verify.json make security-verify

      - name: Upload redacted security verification report
        if: failure() && steps.security_verify.outcome == 'failure'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: security-verify-report
          path: golang/security-artifacts/security-verify.json
          if-no-files-found: error
          retention-days: 14

      - name: Run trusted Redis shared-state conformance
        if: steps.go.outputs.present == 'true'
        working-directory: golang
        run: make redis-integration

      - name: Run trusted Redis readiness recovery
        if: steps.go.outputs.present == 'true'
        working-directory: golang
        run: make readiness-integration

      - name: Run authorized Compose lifecycle
        if: steps.go.outputs.present == 'true'
        working-directory: golang
        run: LLMTW_COMPOSE_LIVE=1 make compose-live-integration

      - name: Build worker
        if: steps.go.outputs.present == 'true'
        working-directory: golang
        run: go build ./...

      - name: Detect container
        id: container
        shell: bash
        run: |
          if [[ -f golang/Dockerfile ]]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify hardened container
        if: steps.container.outputs.present == 'true'
        working-directory: golang
        run: make image-verify

      - name: Scheduled test repetition
        if: github.event_name == 'schedule' && steps.go.outputs.present == 'true'
        working-directory: golang
        run: go test -race -count=5 ./...

  # This produces a retained, redacted evidence bundle only after the normal
  # master verification job. It is intentionally excluded from manual,
  # scheduled, and pull-request executions, and does not publish or sign.
  release-evidence:
    name: Release evidence
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: stable
          cache: true
          cache-dependency-path: golang/go.sum

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
        with:
          version: v0.16.2
          driver-opts: image=moby/buildkit:v0.16.0@sha256:bc1fe18224dbcb92599139db0c745696c48ba9fd4ac24038d1fa81fdd7dcac27

      - name: Set up pinned kubectl for local manifest rendering
        uses: azure/setup-kubectl@776406bce94f63e41d621b960d78ee25c8b76ede # v4.0.1
        with:
          version: v1.32.6

      - name: Collect compact redacted release inputs
        env:
          RELEASE_EVIDENCE_KUBECTL_VERSION: v1.32.6
        run: |
          bash scripts/release/collect.sh \
            --artifact-dir release-artifacts \
            --image-oci-layout "$RUNNER_TEMP/image.oci"

      - name: Inspect immutable OCI manifest descriptor
        id: image
        working-directory: golang
        shell: bash
        run: |
          set -euo pipefail
          digest="$(go run ./tools/releaseverify layout-digest -layout "$RUNNER_TEMP/image.oci")"
          if [[ ! "$digest" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "temporary OCI directory returned an invalid manifest digest" >&2
            exit 1
          fi
          printf 'digest=%s\n' "$digest" >> "$GITHUB_OUTPUT"
          printf 'reference=llm-temporal-worker@%s\n' "$digest" >> "$GITHUB_OUTPUT"

      - name: Download pinned Syft
        id: syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          syft-version: v1.44.0

      - name: Generate and bind CycloneDX SBOM for temporary OCI directory
        shell: bash
        run: |
          set -euo pipefail
          "${{ steps.syft.outputs.cmd }}" oci-dir:"$RUNNER_TEMP/image.oci" -o cyclonedx-json > "$RUNNER_TEMP/sbom.cdx.json"
          python3 scripts/release/collect.py annotate-sbom \
            --input "$RUNNER_TEMP/sbom.cdx.json" \
            --output release-artifacts/sbom.cdx.json \
            --reference "${{ steps.image.outputs.reference }}" \
            --digest "${{ steps.image.outputs.digest }}"

      - name: Scan temporary OCI directory with pinned Trivy
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          scan-type: image
          input: ${{ runner.temp }}/image.oci
          format: json
          output: ${{ runner.temp }}/image-scan.json
          trivy-config: scripts/release/trivy.yaml
          version: v0.72.0
          cache: false

      - name: Bind Trivy result to temporary OCI descriptor
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/release/collect.py annotate-scan \
            --input "$RUNNER_TEMP/image-scan.json" \
            --output release-artifacts/image-scan.json \
            --reference "${{ steps.image.outputs.reference }}" \
            --digest "${{ steps.image.outputs.digest }}"

      - name: Record and verify redacted release evidence
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/release/record.sh \
            -artifact-dir release-artifacts \
            -output release-artifacts/evidence.json \
            -repository "https://github.com/${GITHUB_REPOSITORY}" \
            -revision "$GITHUB_SHA" \
            -image-reference "${{ steps.image.outputs.reference }}" \
            -image-digest "${{ steps.image.outputs.digest }}" \
            -artifact test_summary=test-summary.json \
            -artifact race_summary=race-summary.json \
            -artifact fuzz_summary=fuzz-summary.json \
            -artifact fixture_manifest=fixture-manifest.json \
            -artifact redis_summary=redis-summary.json \
            -artifact temporal_summary=temporal-summary.json \
            -artifact compose_summary=compose-summary.json \
            -artifact redis_log=redis-log.json \
            -artifact temporal_log=temporal-log.json \
            -artifact compose_log=compose-log.json \
            -artifact rendered_manifests=rendered-manifests.json \
            -artifact dependency_license=dependencies.json \
            -artifact vulnerability_results=vulnerabilities.json \
            -artifact sbom=sbom.cdx.json \
            -artifact image_scan=image-scan.json
          make release-verify

      - name: Retain validated redacted release evidence
        if: success()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: release-evidence
          path: release-artifacts/
          if-no-files-found: error
          retention-days: 14

      - name: Remove temporary OCI directory
        if: always()
        shell: bash
        run: rm -rf -- "$RUNNER_TEMP/image.oci"
