              --log "$RUNNER_TEMP/live-contract-evidence.log" \
              --source-revision "${{ github.sha }}"

      - name: Upload redacted live-provider evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
