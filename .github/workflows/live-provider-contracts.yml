              --evidence "$RUNNER_TEMP/live-contract-evidence.json" \
              --log "$RUNNER_TEMP/live-contract-evidence.log" \
              --source-revision "${{ github.sha }}"
          env -i PATH="$PATH" HOME="$RUNNER_TEMP/live-contract-recorder-home" RUNNER_TEMP="$RUNNER_TEMP" \
