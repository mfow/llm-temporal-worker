          git -C "$GITHUB_WORKSPACE" -c credential.helper= -c http.extraHeader= fetch --no-tags --force origin \
            +refs/heads/master:refs/remotes/origin/master
          fetched_master="$(git -C "$GITHUB_WORKSPACE" rev-parse --verify refs/remotes/origin/master)"
          if [[ "$fetched_master" != "$TRUSTED_MASTER_SHA" ]]; then
            echo "public master moved after this protected workflow started" >&2
            exit 1
          fi
          git -C "$GITHUB_WORKSPACE" checkout --detach --force "$TRUSTED_MASTER_SHA"

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          token: ""
          cache: "false"

      - name: Acquire Azure workload identity
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2.3.0
        with:
          client-id: ${{ vars.LLMTW_LIVE_AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.LLMTW_LIVE_AZURE_TENANT_ID }}
          subscription-id: ${{ vars.LLMTW_LIVE_AZURE_SUBSCRIPTION_ID }}
          allow-no-subscriptions: true

      - name: Run bounded live provider contract
        shell: bash
        env:
          LLMTW_LIVE_TESTS: "1"
          LLMTW_LIVE_AUTHORIZED: "1"
          LLMTW_LIVE_AZURE_RESPONSES: "1"
          LLMTW_LIVE_AZURE_OPENAI_ENDPOINT: ${{ vars.LLMTW_LIVE_AZURE_OPENAI_ENDPOINT }}
        run: |
          set -euo pipefail
          go test -v -tags=live ./integration/live -run '^TestLiveProviderContracts$/^azure-responses$' > "$RUNNER_TEMP/live-contract.raw.log" 2>&1

      - name: Clear credential variables
        if: always()
        shell: bash
        run: |
          {
            echo 'OPENAI_API_KEY='
            echo 'OPENROUTER_API_KEY='
            echo 'EXA_API_KEY='
            echo 'ANTHROPIC_API_KEY='
            echo 'AWS_ACCESS_KEY_ID='
            echo 'AWS_SECRET_ACCESS_KEY='
            echo 'AWS_SESSION_TOKEN='
            echo 'AWS_WEB_IDENTITY_TOKEN_FILE='
            echo 'AZURE_CLIENT_ID='
            echo 'AZURE_TENANT_ID='
            echo 'AZURE_FEDERATED_TOKEN_FILE='
          } >> "$GITHUB_ENV"

      - name: Record and verify redacted live evidence
        shell: bash
        run: |
          set -euo pipefail
          env -i PATH="$PATH" HOME="$RUNNER_TEMP/live-contract-recorder-home" RUNNER_TEMP="$RUNNER_TEMP" \
