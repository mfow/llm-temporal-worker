version: llm-temporal-worker/v1
environment: development

server:
  health_address: 0.0.0.0:8080
  metrics_address: 0.0.0.0:9090
  shutdown_timeout: 45s
  finalization_timeout: 10s
  readiness_probe_interval: 5s
  readiness_probe_timeout: 2s
  inline_payload_bytes: 524288

temporal:
  target: temporal:7233
  namespace: default
  task_queue: llmtw-local
  identity_prefix: llmtw-local
  tls:
    enabled: false
    server_name: ""
    ca_file: ""
  worker:
    max_concurrent_activities: 4
    max_concurrent_activity_task_polls: 2
    graceful_stop_timeout: 30s
    heartbeat_keepalive_interval: 1s

state:
  kind: redis
  operation_terminal_retention: 45d
  ambiguous_retention: 90d
  continuation_retention: 30d
  reservation_lease: 2m
  redis:
    addresses: [redis:6379]
    key_prefix: llmtw
    username:
      kind: env
      name: REDIS_USERNAME
    password:
      kind: env
      name: REDIS_PASSWORD
    tls:
      enabled: false
      server_name: ""
      ca_file: ""
    admission_hash_tag: admission
    admission_mode: function
    function_library: llmtw_admission_v1
    admission_version: admission_v1
    admission_digest: c09e24d73750bebee4aad8cd9b1f05abaa22001528cef0ff6842f2241bb8c20b
    max_connections: 16
    dial_timeout: 2s
    operation_timeout: 3s
    required_persistence: aof_and_rdb

blob_store:
  kind: file
  inline_bytes: 262144
  file:
    root: /var/lib/llmtw/blobs

limits:
  request_bytes: 1048576
  items: 128
  parts_per_item: 32
  tools: 32
  schema_bytes: 131072
  json_depth: 32
  continuation_depth: 64
  route_attempts: 3
  provider_timeout: 30s
  max_output_tokens: 4096
  max_budget_buckets_per_window: 512
  token_estimate_safety_ratio: "1.35"

endpoints:
  # This Docker-only fixture intentionally remains subject to the same
  # fail-closed policy as production: its private Compose address is denied
  # by the worker transport. It is a configuration/adapter test fixture, not
  # an end-to-end provider egress target.
  provider-mock:
    family: openai_chat
    base_url: https://provider-mock:8081/v1
    outbound_hosts: [provider-mock]
    auth:
      kind: bearer_env
      name: MOCK_API_KEY
    account_region: local
    timeout: 25s
    service_classes:
      economy:
        provider_value: flex
      standard:
        provider_value: standard
      priority:
        provider_value: priority
    capability_profile: local-mock-v1
    price_catalog: local-v1
    provider_storage:
      permitted: false

models:
  demo-model:
    allowed_tenants: [local]
    data_regions: [local]
    routes:
      - id: local-mock
        endpoint: provider-mock
        model: demo-model
        classes: [economy, standard, priority]

capabilities:
  catalogs:
    - file: /etc/llmtw/capabilities.yaml
      sha256: 244ccc3e30f27354c639bbcf7fe621d7b9898753c6a294749b2658811cf70271
  unknown_in_strict_mode: reject

pricing:
  catalogs:
    - file: /etc/llmtw/prices.yaml
      sha256: 1bc0a367993efa2f1af43646d8020a9079dbdd9820d2cf5dab7713fa34521c80
  require_price_when_budgeted: true
  currency: USD

budgets:
  require_match: true
  policies:
    - id: local-development
      match:
        tenant: local
        environment: development
      windows:
        - duration: 1h
          bucket: 1m
          limit_micro_usd: 1000000
        - duration: 24h
          bucket: 5m
          limit_micro_usd: 5000000

continuation:
  handle_keys:
    - id: local-2026-07
      primary: true
      secret:
        kind: file
        path: /var/run/secrets/llmtw/continuation-hmac
  retain_canonical_transcript: true
  allow_provider_hosted_state: false

telemetry:
  logs:
    format: json
    level: info
  metrics:
    enabled: true
  tracing:
    enabled: false
    otlp_endpoint: ""
    sample_ratio: "0"
  content_logging: disabled
